<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <rect width="80" height="80" rx="8" fill="#050a0f"/>
  <rect x="1" y="1" width="78" height="78" rx="7" stroke="#00D4FF" stroke-width="1.5" stroke-opacity="0.6"/>
  <!-- M letter -->
  <path d="M12 58 L12 22 L28 46 L40 22 L40 58" stroke="#00D4FF" stroke-width="3.5" stroke-linecap="square" stroke-linejoin="miter" fill="none" filter="url(#glow)"/>
  <!-- S letter -->
  <path d="M48 30 C48 24 68 24 68 36 C68 48 48 48 48 60 C48 66 68 66 68 60" stroke="#8B5CF6" stroke-width="3.5" stroke-linecap="square" stroke-linejoin="miter" fill="none" filter="url(#glow2)"/>
  <!-- Glow filters -->
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Corner accents -->
  <line x1="4" y1="4" x2="14" y2="4" stroke="#FF006E" stroke-width="1.5"/>
  <line x1="4" y1="4" x2="4" y2="14" stroke="#FF006E" stroke-width="1.5"/>
  <line x1="76" y1="76" x2="66" y2="76" stroke="#FF006E" stroke-width="1.5"/>
  <line x1="76" y1="76" x2="76" y2="66" stroke="#FF006E" stroke-width="1.5"/>
</svg>
